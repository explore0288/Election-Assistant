<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amrita – India Election Assistant | ECI</title>
  <meta name="description"
    content="Amrita is your friendly election guide. Learn how to register as a voter, check eligibility, understand election timelines, and vote on election day — based on official ECI guidelines." />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-wrapper">
    <div class="chat-container">

      <!-- HEADER -->
      <header class="chat-header">
        <div class="avatar-wrap">
          <div class="avatar">A</div>
          <div class="online-dot"></div>
        </div>
        <div class="header-info">
          <h1>Amrita</h1>
          <p class="subtitle">
            🇮🇳 India Election Assistant &nbsp;·&nbsp;
            <span class="status-text">Online</span>
          </p>
        </div>
        <div class="header-actions">
          <button id="reset-btn" class="icon-btn" title="Start over" aria-label="Start over">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
            </svg>
          </button>
        </div>
      </header>

      <!-- ECI TRUST BANNER -->
      <div class="eci-banner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#138808" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        <span>All information is based on official</span>
        <a href="https://eci.gov.in" target="_blank" rel="noopener">Election Commission of India</a>
        <span>guidelines.</span>
      </div>

      <!-- MESSAGES -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- QUICK REPLIES -->
      <div class="quick-replies" id="quick-replies"></div>

      <!-- INPUT -->
      <div class="chat-input-container">
        <form id="chat-form" autocomplete="off">
          <input type="text" id="chat-input" placeholder="Type a message or choose an option…" />
          <button type="submit" id="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </form>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="chat-footer">
      Powered by <a href="https://eci.gov.in" target="_blank" rel="noopener">eci.gov.in</a>
      &nbsp;·&nbsp; Voter Helpline: <strong>1950</strong>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>

</html>
